appId: com.ducky.desktop
productName: Ducky
executableName: Ducky
copyright: Copyright © 2026 Aman
asar: true

directories:
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: character/master.png
    to: character/master.png
  - from: assets/icons
    to: assets/icons

mac:
  icon: assets/icons/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    CFBundleName: Ducky
    CFBundleDisplayName: Ducky
  target:
    - dmg
    - zip

win:
  icon: assets/icons/icon.ico

linux:
  icon: assets/icons/icon.png

dmg:
  sign: false

artifactName: ${productName}-${version}-${os}-${arch}.${ext}
