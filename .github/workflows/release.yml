name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate tag and package version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid release tag::Expected vMAJOR.MINOR.PATCH, received '$TAG_NAME'."
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "$TAG_NAME" != "v${package_version}" ]]; then
            echo "::error title=Version mismatch::Tag '$TAG_NAME' does not match package.json version '${package_version}'."
            exit 1
          fi

          lock_version="$(node -p "require('./package-lock.json').packages[''].version")"
          if [[ "$lock_version" != "$package_version" ]]; then
            echo "::error title=Lockfile version mismatch::package-lock.json version '${lock_version}' does not match package.json version '${package_version}'."
            exit 1
          fi

          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error title=Tag is not on main::Release tag '$TAG_NAME' must point to a commit contained in origin/main."
            exit 1
          fi

      - name: Cache Electron downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/electron-cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install locked dependencies
        run: npm ci
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache

      - name: Run tests
        run: npm test

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            command: dist:mac
            files: |
              release/*.dmg
              release/*.dmg.blockmap
              release/*.zip
              release/*.zip.blockmap
              release/latest-mac.yml
          - platform: windows
            os: windows-latest
            command: dist:win
            files: |
              release/*.exe
              release/*.exe.blockmap
              release/*.msi
              release/latest.yml
          - platform: linux
            os: ubuntu-latest
            command: dist:linux
            files: |
              release/*.AppImage
              release/*.deb
              release/latest-linux.yml
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      CI: true
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/electron-cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Cache Electron Builder downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/electron-builder-cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install locked dependencies
        run: npm ci
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libopenjp2-tools

      - name: Build distributables
        run: npm run ${{ matrix.command }} -- --publish never
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Verify distributables
        run: npm run release:verify -- ${{ matrix.platform }}

      - name: Stage release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail

          (
            cd release-artifacts
            mapfile -d '' release_files < <(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z)
            if (( ${#release_files[@]} == 0 )); then
              echo "::error title=No release assets::No files were downloaded from the build jobs." >&2
              exit 1
            fi

            for file in "${release_files[@]}"; do
              sha256sum "$file"
            done
          ) > "$RUNNER_TEMP/SHA256SUMS.txt"

          mv "$RUNNER_TEMP/SHA256SUMS.txt" release-artifacts/SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_is_draft="$(
              gh release view "$TAG_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --json isDraft \
                --jq '.isDraft'
            )"
            if [[ "$release_is_draft" != "true" ]]; then
              echo "::error title=Release already published::Refusing to replace assets on published release '$TAG_NAME'."
              exit 1
            fi

            mapfile -t existing_assets < <(
              gh release view "$TAG_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --json assets \
                --jq '.assets[].name'
            )
            for asset in "${existing_assets[@]}"; do
              gh release delete-asset "$TAG_NAME" "$asset" \
                --repo "$GITHUB_REPOSITORY" \
                --yes
            done
          else
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "Ducky ${TAG_NAME}"
          fi

          mapfile -d '' assets < <(find release-artifacts -maxdepth 1 -type f -print0 | sort -z)
          if (( ${#assets[@]} == 0 )); then
            echo "::error title=No release assets::No files were downloaded from the build jobs."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY"

          gh release edit "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
